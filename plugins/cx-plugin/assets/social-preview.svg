<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">CX Notifier social preview</title>
  <desc id="desc">Leave the terminal and receive a notification when Codex or Claude Code needs you.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102A43"/>
      <stop offset="0.58" stop-color="#071827"/>
      <stop offset="1" stop-color="#05101C"/>
    </linearGradient>
    <linearGradient id="accent" x1="740" y1="98" x2="1120" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1160" cy="30" r="250" fill="#2DD4BF" opacity="0.08"/>
  <circle cx="36" cy="640" r="260" fill="#60A5FA" opacity="0.07"/>
  <g font-family="Inter, 'PingFang SC', 'Microsoft YaHei', ui-sans-serif, sans-serif">
    <g transform="translate(72 66)">
