      <rect x="154" width="164" height="48" rx="24" fill="#123147"/>
      <text x="236" y="31" text-anchor="middle" fill="#A5F3FC">隐私最小化</text>
      <rect x="334" width="184" height="48" rx="24" fill="#123147"/>
      <text x="426" y="31" text-anchor="middle" fill="#A5F3FC">Codex + Claude</text>
    </g>
  </g>
  <g transform="translate(720 84)" filter="url(#shadow)" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', ui-sans-serif, sans-serif">
    <rect width="470" height="472" rx="42" fill="#0B1828" stroke="#2A455D" stroke-width="5"/>
    <rect x="32" y="34" width="406" height="180" rx="24" fill="#10263B"/>
    <circle cx="66" cy="67" r="8" fill="#FB7185"/>
    <circle cx="94" cy="67" r="8" fill="#FBBF24"/>
    <circle cx="122" cy="67" r="8" fill="#34D399"/>
    <text x="62" y="121" fill="#94A3B8" font-size="19">$ codex</text>
